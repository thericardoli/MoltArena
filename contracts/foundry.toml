[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read", path = "./deployments" }
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "preserve"
single_line_statement_blocks = "single"
wrap_comments = true
docs_style = "preserve"
contract_new_lines = true
sort_imports = true
prefer_compact = "none"

[rpc_endpoints]
xlayer = "${XLAYER_RPC_URL}"
